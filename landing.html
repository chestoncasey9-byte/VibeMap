<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeMap — Drop your vibe. See the world's mood.</title>
  <meta name="description" content="The real-time emotional map of the world. Drop your vibe anonymously and see how the world feels right now." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #f5f2ee;
      --bg2: #ede9e3;
      --text: #1a1814;
      --text2: #6b6560;
      --accent: #8b7dff;
      --accent-dark: #6b5df0;
      --border: #ddd9d3;
      --surface: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRAIN ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.5;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      background: rgba(245,242,238,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--text);
      text-decoration: none;
    }

    .nav-logo span { color: var(--accent); }

    .nav-cta {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      padding: 8px 16px;
      border-radius: 4px;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .nav-cta:hover {
      background: var(--accent);
      color: #fff;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
      text-align: center;
    }

    .hero-tag {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--text2);
      text-transform: uppercase;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.6s ease both;
    }

    .hero-tag::before,
    .hero-tag::after {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--border);
    }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 16vw, 120px);
      line-height: 0.9;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 8px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .hero-title span {
      color: var(--accent);
      display: block;
    }

    .hero-sub {
      font-size: clamp(16px, 4vw, 20px);
      color: var(--text2);
      font-style: italic;
      font-weight: 400;
      line-height: 1.6;
      max-width: 440px;
      margin: 28px auto 0;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    /* ── EMOJI STRIP ── */
    .emoji-strip {
      display: flex;
      gap: 12px;
      margin: 40px 0;
      font-size: 28px;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .emoji-strip span {
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }

    .emoji-strip span:nth-child(2) { animation-delay: 0.3s; }
    .emoji-strip span:nth-child(3) { animation-delay: 0.6s; }
    .emoji-strip span:nth-child(4) { animation-delay: 0.9s; }
    .emoji-strip span:nth-child(5) { animation-delay: 1.2s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* ── SIGNUP FORM ── */
    .signup-wrap {
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .signup-form {
      display: flex;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s;
    }

    .signup-form:focus-within {
      box-shadow: 0 4px 24px rgba(139,125,255,0.15), 0 0 0 2px var(--accent);
    }

    .signup-input {
      flex: 1;
      padding: 16px 18px;
      border: none;
      outline: none;
      font-family: 'Lora', serif;
      font-size: 14px;
      color: var(--text);
      background: transparent;
    }

    .signup-input::placeholder { color: var(--text2); }

    .signup-btn {
      padding: 16px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .signup-btn:hover { background: var(--accent-dark); }
    .signup-btn:active { transform: scale(0.98); }

    .signup-note {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.5px;
      color: var(--text2);
      margin-top: 12px;
      text-align: center;
    }

    /* ── SUCCESS STATE ── */
    .signup-success {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }

    .signup-success .success-emoji { font-size: 32px; }
    .signup-success .success-text {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text2);
      text-transform: uppercase;
    }

    /* ── STATS ── */
    .stats {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      gap: 48px;
      padding: 48px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
    }

    .stat {
      text-align: center;
    }

    .stat-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px;
      letter-spacing: 1px;
      color: var(--text);
      line-height: 1;
    }

    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text2);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text2);
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      nav { padding: 16px 20px; }
      .stats { gap: 28px; }
      .signup-btn { padding: 16px 14px; font-size: 14px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">Vibe<span>Map</span></a>
  <a href="index.html" class="nav-cta">Open App →</a>
</nav>

<section class="hero">
  <div class="hero-tag">Real-time emotional map</div>
  <h1 class="hero-title">Drop Your<span>Vibe.</span></h1>
  <p class="hero-sub">See how the world feels right now. Anonymous. Live. Honest.</p>

  <div class="emoji-strip">
    <span>😊</span>
    <span>🔥</span>
    <span>😌</span>
    <span>😢</span>
    <span>🥰</span>
  </div>

  <div class="signup-wrap">
    <div class="signup-form" id="signup-form">
      <input
        class="signup-input"
        type="email"
        id="email-input"
        placeholder="your@email.com"
        autocomplete="email"
      />
      <button class="signup-btn" id="signup-btn">NOTIFY ME</button>
    </div>
    <div class="signup-success" id="signup-success">
      <span class="success-emoji">✦</span>
      <span class="success-text">You're on the list</span>
    </div>
    <p class="signup-note">Get early access. No spam, ever.</p>
  </div>
</section>

<div class="stats">
  <div class="stat">
    <div class="stat-number" id="vibe-count">—</div>
    <div class="stat-label">Vibes Dropped</div>
  </div>
  <div class="stat">
    <div class="stat-number">10</div>
    <div class="stat-label">Emotions</div>
  </div>
  <div class="stat">
    <div class="stat-number">∞</div>
    <div class="stat-label">Locations</div>
  </div>
</div>

<footer>
  © 2025 VibeMap &nbsp;·&nbsp; <a href="index.html">Open App</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://ppquledywoivtqhmfjla.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_C05e3lzQLs51Fr_Gfj2v_w_z77bUIls';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── VIBE COUNT ──
  async function loadCount() {
    const { count } = await db
      .from('vibes')
      .select('*', { count: 'exact', head: true });
    if (count !== null) {
      document.getElementById('vibe-count').textContent =
        count > 999 ? (count / 1000).toFixed(1) + 'K' : count;
    }
  }
  loadCount();

  // ── EMAIL SIGNUP ──
  document.getElementById('signup-btn').addEventListener('click', async () => {
    const email = document.getElementById('email-input').value.trim();
    if (!email || !email.includes('@')) {
      document.getElementById('email-input').focus();
      return;
    }

    const btn = document.getElementById('signup-btn');
    btn.textContent = '...';
    btn.disabled = true;

    // Save to Supabase waitlist table
    const { error } = await db.from('waitlist').insert({ email });

    document.getElementById('signup-form').style.display = 'none';
    document.getElementById('signup-success').style.display = 'flex';
  });

  // Allow enter key
  document.getElementById('email-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('signup-btn').click();
  });
</script>
</body>
  </html>
